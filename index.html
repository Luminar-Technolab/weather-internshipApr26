<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Details</title>
    <!-- bootstrap cdn link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div style="min-height: 100vh;" class="d-flex justify-content-center align-items-center">
        <div style="min-height: 80vh;" class="w-75 bg-info rounded p-5">
            <div class="row h-100 ">
                <div style="background-image: url('https://videocdn.cdnpk.net/videos/96a9087a-de64-4a8c-a676-7ccc273aad46/horizontal/thumbnails/large.jpg');background-size: cover;" class="col-lg-8 text-light p-2">
                    <h3>Weather Forecast</h3>
                    <div style="margin-top: 200px;">
                        <h1 id="temp"></h1>
                        <h4 id="place" class="mt-3"></h4>
                        <p id="today"></p>
                        <div class="d-flex justify-content-center align-items-center flex-column">
                            <i class="fa-solid fa-cloud-sun-rain"></i>
                            <p id="icon"></p>
                        </div>
                    </div>
                </div>
                
                <div class="col-lg-4 text-light p-2">
                    <div class="d-flex mb-5">
                        <input id="city" type="text" placeholder="Input City Name" class="form-control">
                        <button onclick="search()" class="btn"> <i class="fa-solid fa-magnifying-glass"></i> </button>
                    </div>
                    <hr>
                    <div class="text-end ">
                        <h5 class="mb-3">Weather Details</h5>
                        <div>
                            <h6>Country</h6>
                            <p id="country"></p>
                        </div>
                        <div>
                            <h6>Humidity</h6>
                            <p id="humidity"></p>
                        </div>
                        <div>
                            <h6>Wind</h6>
                            <p id="wind"></p>
                        </div>
                        <div>
                            <h6>Pressure</h6>
                            <p id="pressure"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    const search = async ()=>{
        const cityName = city.value
        if(cityName){
            console.log(cityName);
            //api call
            const result = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=8ac5c4d57ba6a4b3dfcf622700447b1e&units=metric`)
            console.log(result);
            const serverResponse = await result.json()
            console.log(serverResponse);
            temp.innerHTML = `${serverResponse.main.temp}° C`
            place.innerHTML = `${serverResponse.name}`
            today.innerHTML = `${new Date()}`
            icon.innerHTML = `${serverResponse.weather[0].main}`
            country.innerHTML = serverResponse.sys.country
            humidity.innerHTML  = serverResponse.main.humidity
            wind.innerHTML = serverResponse.wind.speed
            pressure.innerHTML = serverResponse.main.pressure
        }else{
            alert("Input valid data")
        }
    }
</script>
</html>
